name: 50代シングルマザーの日常投稿

on:
  schedule:
    - cron: '0 21 * * *'  # 毎日 JST 6:00（朝）
    - cron: '0 9 * * *'   # 毎日 JST 18:00（夕方）
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ライブラリをインストール
        run: pip install -r requirements.txt

      - name: スクリプトを実行
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: python post_horoscope.py

      - name: 過去投稿を保存
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add past_posts.json || true
          git diff --staged --quiet || git commit -m "過去投稿を更新"
          git push || true